<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 AI 스마트 분리수거 대작전</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* [1. 디자인 - CSS] */
        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f0fdf4; /* 연한 초록 배경 */
            text-align: center;
            color: #166534;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 16px; color: #374151; }

        /* 카메라 화면 꾸미기 */
        #webcam-container {
            margin: 20px auto;
            border: 5px solid #22c55e;
            border-radius: 15px;
            overflow: hidden;
            width: 200px; /* 티처블 머신 기본 사이즈 */
            height: 200px;
        }

        /* 버튼 꾸미기 */
        button {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            transition: 0.3s;
        }
        button:hover { background-color: #16a34a; transform: scale(1.05); }

        /* 결과 창 꾸미기 */
        #label-container {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
            padding: 10px;
            background: #f8fafc;
            border-radius: 10px;
        }

        /* 설문 버튼 스타일 */
        .survey-btn { background-color: #f59e0b; }
        .survey-btn:hover { background-color: #d97706; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌿 AI 분리수거 판별기</h1>
        <p>쓰레기를 카메라에 비추고 아래 버튼을 눌러주세요!</p>

        <div id="webcam-container"></div>
        
        <div id="label-container">분석 대기 중...</div>

        <button type="button" onclick="init()">시작하기</button>
        <br>
        <button class="survey-btn" onclick="window.open('여기에_구글_설문지_주소를_넣으세요', '_blank')">
            📋 프로젝트 피드백 남기기
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        // [3. 로직 - JavaScript]

        // ⚠️ 아래 큰따옴표 안에 본인의 티처블 머신 주소를 꼭 넣어주세요!
        const URL = "여기에_티처블_머신_주소를_넣으세요"; 

        let model, webcam, labelContainer, maxPredictions;
        let isQuizRunning = false; // 퀴즈가 중복으로 뜨지 않게 방지

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // 모델 로드
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // 카메라 설정
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            // 화면에 카메라 추가
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            // 실시간 결과 표시
            let bestPrediction = "";
            let highestProb = 0;
            let bestClassName = "";

            for (let i = 0; i < maxPredictions; i++) {
                if(prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    bestClassName = prediction[i].className;
                }
            }

            labelContainer.innerHTML = bestClassName + " (확률: " + (highestProb * 100).toFixed(0) + "%)";

            // [퀴즈 로직] 확률이 90% 이상이고 퀴즈가 진행 중이 아닐 때만 실행
            if (highestProb > 0.90 && !isQuizRunning) {
                isQuizRunning = true; // 퀴즈 실행 중으로 표시
                
                if (bestClassName === "Plastic") { // 'Plastic'은 티처블 머신에서 정한 이름으로 수정!
                    alert("📢 AI 분석: 플라스틱입니다! \n방법: 내용물을 비우고 라벨을 떼서 배출하세요.");
                    let q = confirm("❓ 퀴즈: 플라스틱 페트병은 발로 밟아서 압착해야 할까요?");
                    if(q) alert("🎉 정답! 부피를 줄이는 것이 중요해요.");
                    else alert("😢 오답! 부피를 줄여서 버려야 한답니다.");
                } 
                else if (bestClassName === "Paper") {
                    alert("📢 AI 분석: 종이입니다! \n방법: 테이프나 택배 송장을 제거하고 배출하세요.");
                    let q = confirm("❓ 퀴즈: 영수증은 종이류로 분리수거가 될까요?");
                    if(!q) alert("🎉 정답! 영수증은 재활용이 안 되는 일반쓰레기에요.");
                    else alert("😢 오답! 영수증은 감열지라 재활용이 안 돼요.");
                }

                // 퀴즈 종료 후 3초 뒤에 다시 인식 시작 (연속 팝업 방지)
                setTimeout(() => { isQuizRunning = false; }, 3000);
            }
        }
    </script>
</body>
</html>
